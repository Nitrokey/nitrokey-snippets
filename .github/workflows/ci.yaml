name: Continuous integration

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check-nitrokey3-libfido2:
    name: Check nitrokey3/libfido2 snippet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Install required packages
        run: sudo apt update && sudo apt install -y clang-format libfido2-dev make
      - name: Build snippet
        run: cd nitrokey3/libfido2 && make
      - name: Check snippet
        run: cd nitrokey3/libfido2 && make check
